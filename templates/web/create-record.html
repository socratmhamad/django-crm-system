{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm me-3 border-0 transition-all">
                <i class="bi bi-arrow-left"></i> Back
            </a>
            <div>
                <h2 class="h4 mb-0 fw-bold">Create New Record</h2>
                <p class="text-soft mb-0 mt-1 small">Fill out the form below to add a new client to the CRM.</p>
            </div>
        </div>

        <div class="card shadow-sm border-secondary border-opacity-25 crm-surface-soft">
            <div class="card-body p-4 p-md-5">
                <form method="POST" autocomplete="off">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-end gap-2 mt-4 pt-4 border-top border-secondary border-opacity-25">
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary shadow-sm">Cancel</a>
                        <button type="submit" class="btn btn-primary shadow-sm px-4">
                            <i class="bi bi-check2-circle me-1"></i> Save Record
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
