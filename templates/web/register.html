{% extends "base.html" %}

{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-secondary border-opacity-25 crm-surface-soft">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1">Create an account</h2>
                    <p class="text-soft small">Join us to start managing your CRM data.</p>
                </div>
                <form method="POST" autocomplete="off">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary py-2 fw-medium">Register</button>
                    </div>
                </form>
                <div class="text-center mt-4 pt-4 border-top border-secondary border-opacity-25">
                    <p class="text-soft small mb-0">Already have an account? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
