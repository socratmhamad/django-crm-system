 {% extends "base.html" %}


{% block content %}

<div class="intro-shell position-relative overflow-hidden rounded-4">
	<div id="introCard" class="intro-card text-center">
		<h2 class="fw-bold mb-3">Django CRM Management at Its Finest</h2>
		<p class="text-soft mb-4">Track your records, stay organized, and move faster every day.</p>

		{% if user.is_authenticated %}
		<a href="{% url 'dashboard' %}" class="btn btn-primary intro-cta px-4 py-2">My Dashboard</a>

		{% else %}
		<a href="{% url 'register' %}" class="btn btn-primary intro-cta px-4 py-2">Register</a>

		{% endif %}
	</div>
</div>

<style>
	.intro-shell {
		isolation: isolate;
		padding: 3rem 1.5rem;
		border: 1px solid rgba(146, 164, 182, 0.2);
		background: linear-gradient(180deg, rgba(19, 26, 35, 0.78), rgba(15, 21, 28, 0.9));
	}

	.intro-shell::before {
		content: "";
		position: absolute;
		inset: -35%;
		z-index: -1;
		opacity: 0.12;
		background: radial-gradient(circle at 20% 20%, rgba(56, 135, 220, 0.5), transparent 50%),
					radial-gradient(circle at 80% 70%, rgba(57, 200, 167, 0.35), transparent 45%);
		animation: introGradientShift 16s ease-in-out infinite alternate;
		transform: translate3d(0, 0, 0);
	}

	.intro-card {
		max-width: 700px;
		margin: 0 auto;
		opacity: 0;
		transform: translateY(10px);
		transition: opacity 600ms  ease-out, transform 600ms  ease-out;
	}

	.intro-card.is-visible {
		opacity: 1;
		transform: translateY(0);
	}

	.intro-cta {
		border-radius: 0.7rem;
		transition: transform 160ms ease-out, box-shadow 160ms ease-out;
		box-shadow: 0 0 0 rgba(69, 149, 255, 0);
	}

	.intro-cta:hover,
	.intro-cta:focus-visible {
		transform: scale(1.03);
		box-shadow: 0 0 18px rgba(69, 149, 255, 0.28);
	}

	@keyframes introGradientShift {
		from {
			transform: translate3d(-2%, -1%, 0) scale(1);
		}
		to {
			transform: translate3d(2%, 1%, 0) scale(1.03);
		}
	}

	@media (max-width: 576px) {
		.intro-shell {
			padding: 2rem 1.2rem;
		}

		.intro-card h2 {
			font-size: 1.5rem;
		}
	}
</style>

<script>
	document.addEventListener("DOMContentLoaded", function () {
		var introCard = document.getElementById("introCard");
		if (!introCard) {
			return;
		}

		requestAnimationFrame(function () {
			introCard.classList.add("is-visible");
		});
	});
</script>

{% endblock %}
